<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="auth-page">
    <main class="card">
      <h1 class="title">Welcome Back</h1>
      <p class="subtitle">Login to enter your home page.</p>

      <form id="authForm" class="form">
        <div class="field" id="nameField">
          <label for="name">Name</label>
          <input id="name" name="name" type="text" placeholder="naitik tiwari" autocomplete="name" />
        </div>

        <div class="field">
          <label for="email">Email</label>
          <input id="email" name="email" type="email" placeholder="you@example.com" required autocomplete="email" />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="At least 6 characters" required autocomplete="current-password" />
        </div>

        <button type="submit" id="submitBtn">Login</button>
      </form>

      <p class="switch-text">
        <span id="modeText">No account?</span>
        <button id="switchModeBtn" class="link-btn" type="button">Create one</button>
      </p>

      <p id="message" class="message" role="status" aria-live="polite"></p>
    </main>

    <script src="login.js"></script>
  </body>
</html>
